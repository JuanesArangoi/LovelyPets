# Project-wide Gradle settings.

# Reducción extrema de memoria para sistemas con pocos recursos.
org.gradle.jvmargs=-Xmx512m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true

# Deshabilitar el daemon puede ayudar en equipos con poca RAM, 
# aunque hace que el build sea un poco más lento.
org.gradle.daemon=false

# Forzar el uso de IPv4 para evitar "Connection refused"
kotlin.daemon.jvmargs=-Djava.net.preferIPv4Stack=true

# Configuraciones estándar de Android
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
